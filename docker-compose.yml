version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crypto_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    restart: on-failure
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/crypto_db

volumes:
  postgres_data: